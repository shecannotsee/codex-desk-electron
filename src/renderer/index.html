<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodexDesk Electron</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-root">
    <aside class="sidebar">
      <div class="sidebar-title">会话列表</div>
      <div class="sidebar-actions">
        <button id="btn-new-conv" class="btn-primary">新建对话</button>
        <button id="btn-rename-conv" class="btn-secondary">重命名</button>
      </div>
      <div class="sidebar-actions">
        <button id="btn-close-conv" class="btn-danger btn-wide">关闭当前会话</button>
      </div>
      <div id="conversation-list" class="conversation-list"></div>
    </aside>

    <main class="workspace">
      <section class="focus-row">
        <div id="chat-title" class="chat-title">当前对话（活跃）: -</div>
        <div class="meta-chip">当前会话ID: <span id="session-id">-</span></div>
        <div class="meta-chip">状态: <span id="phase">空闲</span></div>
        <div class="meta-chip">耗时: <span id="elapsed">00:00</span></div>
      </section>

      <section class="setting-row">
        <label for="command-input">Codex命令:</label>
        <input id="command-input" type="text" />
      </section>

      <section class="setting-row">
        <label for="workdir-input">工作目录:</label>
        <input id="workdir-input" type="text" />
      </section>

      <section class="setting-row">
        <div id="model-meta" class="model-meta">Codex版本: - | 模型: -</div>
        <button id="btn-refresh-version" class="btn-secondary">获取Codex版本</button>
        <button id="btn-refresh-model" class="btn-secondary">获取模型</button>
      </section>

      <section class="setting-row actions-row">
        <button id="btn-clear-chat">清空当前对话内容</button>
        <button id="btn-clear-runtime">清空右侧运行日志</button>
      </section>

      <section class="content-row">
        <div id="chat-view" class="chat-view"></div>

        <div class="runtime-panel">
          <div class="tabs">
            <button class="tab-btn active" data-tab="structured">结构化事件</button>
            <button class="tab-btn" data-tab="workflow">运行步骤</button>
            <button class="tab-btn" data-tab="raw">事件原文(JSON)</button>
          </div>

          <div class="tab-content">
            <div id="tab-structured" class="tab-pane active"></div>
            <div id="tab-workflow" class="tab-pane"></div>
            <pre id="tab-raw" class="tab-pane raw-pane"></pre>
          </div>
        </div>
      </section>

      <section class="input-row">
        <textarea id="input-box" placeholder="输入消息，Ctrl+Enter 发送"></textarea>
      </section>

      <section class="send-row">
        <button id="btn-send">发送</button>
        <button id="btn-stop">停止</button>
      </section>
    </main>
  </div>

  <div id="rename-modal" class="modal-backdrop hidden">
    <div class="modal-card">
      <div class="modal-title">重命名会话</div>
      <input id="rename-input" class="modal-input" type="text" placeholder="请输入会话名称" />
      <div class="modal-actions">
        <button id="rename-cancel">取消</button>
        <button id="rename-confirm">确认</button>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
